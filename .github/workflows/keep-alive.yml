name: Keep Supabase Alive
on:
  schedule:
    - cron: "0 9 * * 1,4"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: curl -sS "https://attfuuavgtnstmnrbxtw.supabase.co/rest/v1/system_settings?select=key&limit=1" -H "apikey:${{ secrets.SUPABASE_KEY }}" -H "Authorization:Bearer ${{ secrets.SUPABASE_KEY }}"
